<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo Item Card</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <article class="todo-card" data-testid="test-todo-card">
    
    <header class="todo-header">
      <h2 class="todo-title" data-testid="test-todo-title">Deploy Stage 0 Updates</h2>
      <span class="badge priority-high" data-testid="test-todo-priority" aria-label="High Priority">🔴 High</span>
    </header>

    <p class="todo-description" data-testid="test-todo-description">
      Ensure all unit tests and automated accessibility checks pass before merging into the main branch. Check WCAG contrast ratios specifically.
    </p>

    <div class="todo-meta">
      <div class="time-block">
        <time class="due-date" datetime="2026-04-13T18:00:00" data-testid="test-todo-due-date">Due Apr 13, 2026</time>
        <span class="time-remaining" data-testid="test-todo-time-remaining" aria-live="polite">Calculating...</span>
      </div>
      <span class="badge status-pending" data-testid="test-todo-status">Pending</span>
    </div>

    <ul class="todo-tags" data-testid="test-todo-tags" role="list">
      <li class="tag" data-testid="test-todo-tag-work">work</li>
      <li class="tag" data-testid="test-todo-tag-urgent">urgent</li>
      <li class="tag">development</li>
    </ul>

    <footer class="todo-footer">
      <div class="checkbox-wrapper">
        <input type="checkbox" id="todo-complete" data-testid="test-todo-complete-toggle">
        <label for="todo-complete">Mark as done</label>
      </div>
      
      <div class="actions">
        <button class="btn btn-edit" data-testid="test-todo-edit-button">Edit</button>
        <button class="btn btn-delete" data-testid="test-todo-delete-button">Delete</button>
      </div>
    </footer>

  </article>

  <script src="script.js"></script>
</body>
</html>
